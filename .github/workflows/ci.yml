name: CI – Test, Lint & Build

on:
  push:
    branches: [main, "feature/**", "fix/**"]
  pull_request:
    branches: [main]

env:
  REGISTRY: docker.io
  IMAGE_PREFIX: ${{ secrets.DOCKER_USERNAME }}/polyglot

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # .NET API – test + lint
  # ─────────────────────────────────────────────────────────────────────────
  test-dotnet:
    name: .NET Tests & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-dotnet

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore PolyglotAPI.sln

      - name: Check formatting (dotnet format)
        run: dotnet format PolyglotAPI.sln --verify-no-changes --severity warn

      - name: Build
        run: dotnet build PolyglotAPI.sln --no-restore -c Release

      - name: Run tests
        run: dotnet test PolyglotAPI.sln --no-build -c Release --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-test-results
          path: backend-dotnet/tests/**/*.trx

  # ─────────────────────────────────────────────────────────────────────────
  # Python Worker – test + lint
  # ─────────────────────────────────────────────────────────────────────────
  test-python:
    name: Python Tests & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker-python

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with flake8
        run: flake8 src/ tests/ --max-line-length=100 --ignore=E501

      - name: Run pytest
        run: pytest tests/ -v --tb=short

  # ─────────────────────────────────────────────────────────────────────────
  # JavaScript Frontend – test + lint
  # ─────────────────────────────────────────────────────────────────────────
  test-frontend:
    name: Frontend Tests & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-js

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend-js/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend-js

      - name: Lint
        run: npm run lint -- --max-warnings 10
        working-directory: frontend-js

      - name: Run tests
        run: npm run build
        working-directory: frontend-js

  # ─────────────────────────────────────────────────────────────────────────
  # Build & push Docker images (only on push, not PRs)
  # ─────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [test-dotnet, test-python, test-frontend]
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Determine image tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "tag=latest" >> $GITHUB_OUTPUT
            echo "sha_tag=${{ github.sha }}" >> $GITHUB_OUTPUT
          else
            BRANCH=$(echo "${{ github.ref_name }}" | tr '/' '-')
            echo "tag=${BRANCH}" >> $GITHUB_OUTPUT
            echo "sha_tag=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      # Backend
      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend-dotnet
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-backend:${{ steps.tag.outputs.tag }}
            ${{ env.IMAGE_PREFIX }}-backend:${{ steps.tag.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Worker
      - name: Build & push worker
        uses: docker/build-push-action@v6
        with:
          context: ./worker-python
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-worker:${{ steps.tag.outputs.tag }}
            ${{ env.IMAGE_PREFIX }}-worker:${{ steps.tag.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Frontend
      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend-js
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-frontend:${{ steps.tag.outputs.tag }}
            ${{ env.IMAGE_PREFIX }}-frontend:${{ steps.tag.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────
  # Trigger Jenkins deployment (main branch only)
  # ─────────────────────────────────────────────────────────────────────────
  trigger-jenkins:
    name: Trigger Jenkins CD
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Jenkins job
        run: |
          curl -X POST "${{ secrets.JENKINS_URL }}/job/polyglot-deploy/build" \
            --user "${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_API_TOKEN }}" \
            --data-urlencode json='{"parameter":[{"name":"IMAGE_TAG","value":"${{ github.sha }}"}]}'
